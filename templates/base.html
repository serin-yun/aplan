<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}APlan Integration Impact Map{% endblock %}</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- vis.js Network -->
    <script type="text/javascript" src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
    <!-- Mermaid.js -->
    <script src="https://unpkg.com/mermaid@11/dist/mermaid.min.js"></script>
    <script>
        mermaid.initialize({ startOnLoad: true });
    </script>
    <style>
        body {
            padding-top: 20px;
            padding-bottom: 40px;
        }
        .header {
            border-bottom: 2px solid #007bff;
            margin-bottom: 30px;
            padding-bottom: 10px;
        }
        .header h1 {
            color: #007bff;
            margin: 0;
        }
        .mermaid {
            text-align: center;
            margin: 20px 0;
        }
        .object-detail-panel {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .info-row {
            margin-bottom: 10px;
        }
        .info-label {
            font-weight: bold;
            color: #495057;
        }
        .impact-table {
            margin-top: 20px;
        }
        .mermaid-code-area {
            font-family: monospace;
            font-size: 12px;
        }
        /* vis.js Network 스타일 */
        #network-container {
            width: 100%;
            height: 600px;
            min-height: 600px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #fafafa;
            position: relative;
        }
        .network-controls {
            margin-bottom: 15px;
        }
        .network-info {
            margin-top: 15px;
            padding: 10px;
            background-color: #f8f9fa;
            border-radius: 5px;
            font-size: 14px;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="d-flex justify-content-between align-items-center">
                <h1>APlan Integration Impact Map</h1>
                <nav>
                    <a href="/objects" class="btn btn-sm btn-outline-primary me-2">검색</a>
                    <a href="/objects/overview" class="btn btn-sm btn-outline-primary">전체 맵</a>
                </nav>
            </div>
        </div>
        
        {% block content %}{% endblock %}
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
