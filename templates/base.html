<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}APlan Integration Impact Map{% endblock %}</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/static/css/custom.css" rel="stylesheet">
    <!-- vis.js Network -->
    <script type="text/javascript" src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
    <!-- Mermaid.js -->
    <script src="https://unpkg.com/mermaid@11/dist/mermaid.min.js"></script>
    <script>
        mermaid.initialize({ startOnLoad: true });
    </script>
    <style>
        /* 추가 스타일은 custom.css에서 관리 */
        .mermaid {
            text-align: center;
            margin: 20px 0;
        }
        .object-detail-panel {
            background: #f8f9fa;
            padding: 1.5rem;
            border-radius: var(--radius-md);
            margin-bottom: 1.5rem;
            border: 1px solid #dee2e6;
        }
        .info-row {
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--gray-200);
        }
        .info-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .info-label {
            font-weight: 600;
            color: var(--gray-700);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }
        .impact-table {
            margin-top: 20px;
        }
        .mermaid-code-area {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius);
        }
        /* vis.js Network 스타일 개선 */
        #network-container {
            width: 100%;
            height: 600px;
            min-height: 600px;
            border: 1px solid #dee2e6;
            border-radius: var(--radius-md);
            background: #fafafa;
            position: relative;
        }
        .network-controls {
            margin-bottom: 15px;
        }
        .network-info {
            margin-top: 15px;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            border-left: 3px solid #007bff;
        }
        .navbar-toggler {
            border: 2px solid rgba(255, 255, 255, 0.5);
            padding: 0.25rem 0.5rem;
            border-radius: var(--radius);
        }
        .navbar-toggler-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba%28255, 255, 255, 0.9%29' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="d-flex justify-content-between align-items-center">
                <h1><a href="/dashboard" style="text-decoration: none; color: inherit;">APlan Integration Impact Map</a></h1>
                <!-- 데스크톱 네비게이션 -->
                <nav class="d-none d-md-flex">
                    <a href="/dashboard" class="btn btn-sm btn-outline-primary me-2">대시보드</a>
                    <a href="/objects" class="btn btn-sm btn-outline-primary me-2">검색</a>
                    <a href="/objects/overview" class="btn btn-sm btn-outline-primary">전체 맵</a>
                </nav>
                <!-- 모바일 네비게이션 토글 -->
                <button class="navbar-toggler d-md-none" type="button" data-bs-toggle="collapse" data-bs-target="#mobileNav" aria-controls="mobileNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
            <!-- 모바일 네비게이션 메뉴 -->
            <div class="collapse d-md-none" id="mobileNav">
                <nav class="mt-3">
                    <div class="d-grid gap-2">
                        <a href="/dashboard" class="btn btn-outline-primary">대시보드</a>
                        <a href="/objects" class="btn btn-outline-primary">검색</a>
                        <a href="/objects/overview" class="btn btn-outline-primary">전체 맵</a>
                        <a href="/upload" class="btn btn-outline-secondary">파일 업로드</a>
                        <a href="/dashboard/guide" class="btn btn-outline-secondary">사용 가이드</a>
                    </div>
                </nav>
            </div>
        </div>
        
        <!-- 브레드크럼 네비게이션 -->
        {% block breadcrumb %}
        <nav aria-label="breadcrumb" class="mb-3">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/dashboard">홈</a></li>
                {% block breadcrumb_items %}{% endblock %}
            </ol>
        </nav>
        {% endblock %}
        
        {% block content %}{% endblock %}
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
